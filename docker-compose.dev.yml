services:
  redis:
    # Bind to loopback only; never expose the (now password-protected) Redis on
    # all interfaces, even in dev (M-7).
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  db:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  frontend:
    build:
      target: dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    # The container now listens on BACKEND_PORT (see backend/Dockerfile), so map
    # host->container on the same port. Change BACKEND_PORT alone to move it.
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"