name: Orchestration Pull Request Checks

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'orchestration/**'
      - '.github/workflows/**'
  push:
    branches: [main, develop]
    paths:
      - 'orchestration/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  PYTHONPATH: orchestration

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and uv
        uses: ./.github/actions/python-uv
        with:
          working-directory: 'orchestration'

      - name: Run lint, format and typecheck
        uses: ./.github/actions/lint-format-typecheck
        with:
          working-directory: 'orchestration'

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY_USER: ${{ secrets.DHI_USERNAME }}
      DOCKER_REGISTRY_PASSWORD: ${{ secrets.DHI_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hardened Images
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_PASSWORD }}

      - name: Setup Python and uv
        uses: ./.github/actions/python-uv
        with:
          working-directory: 'orchestration'

      - name: Run Tests
        working-directory: 'orchestration'
        run: uv run pytest
