# runtime security
cap_drop: ["ALL"]   # if something breaks because of this, grant the corresponding permission
security_opt: ["no-new-privileges"]
read_only: true

# tmpfs mounts with secure options (size= bounds memory-backed disk usage, M-8)
tmpfs:
  "/tmp": "rw,noexec,nosuid,nodev,size=64m"
  "/run": "rw,noexec,nosuid,nodev,size=16m"

# limits
pids_limit: 256
ulimits:
  - name: "nofile"
    soft: 1024
    hard: 1024

# resources
mem_limit: "512m"
nano_cpus: 1000000000   # = 1 CPU

# network
network_mode: "none"

# runtime
time_limit_seconds: 30
log_tail: 10000

# Build/extraction limits; overridable here (builder applies defaults if omitted).
build_limits:
  max_archive_bytes: 52428800       # 50 MiB compressed ZIP upper bound
  max_uncompressed_bytes: 268435456 # 256 MiB total uncompressed (ZIP-bomb guard)
  max_file_count: 2000              # max ZIP entries
  max_nesting_depth: 16             # max path-component depth per entry
  build_timeout_seconds: 300        # wall-clock cap on `docker build`
  syntax_check_timeout_seconds: 30  # wall-clock cap on the syntax-check container
  build_network_mode: "none"        # network for the agent image build (no egress)
