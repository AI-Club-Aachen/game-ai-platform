services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      app-network:
        aliases:
          - gameai-postgres

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:?VITE_API_URL is required}
      - MAX_TURN_TIME_LIMIT_SECONDS=${MAX_TURN_TIME_LIMIT_SECONDS:?MAX_TURN_TIME_LIMIT_SECONDS is required}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: backend/.
    expose:
      - "8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT is required}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@gameai-postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}}
      DB_ECHO: ${DB_ECHO:?DB_ECHO is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:?JWT_ALGORITHM is required}
      JWT_ACCESS_TOKEN_EXPIRE_HOURS: ${JWT_ACCESS_TOKEN_EXPIRE_HOURS:?JWT_ACCESS_TOKEN_EXPIRE_HOURS is required}
      API_V1_PREFIX: ${API_V1_PREFIX:?API_V1_PREFIX is required}
      PROJECT_NAME: ${PROJECT_NAME:-AI Game Competition Platform}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT is required}
      SMTP_USERNAME: ${SMTP_USERNAME:?SMTP_USERNAME is required}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD is required}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:?SMTP_FROM_ADDRESS is required}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:?SMTP_FROM_NAME is required}
      SMTP_USE_TLS: ${SMTP_USE_TLS:?SMTP_USE_TLS is required}
      EMAIL_VERIFICATION_TOKEN_EXPIRE_HOURS: ${EMAIL_VERIFICATION_TOKEN_EXPIRE_HOURS:?EMAIL_VERIFICATION_TOKEN_EXPIRE_HOURS is required}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:?PASSWORD_RESET_TOKEN_EXPIRE_MINUTES is required}
      BYPASS_EMAIL_VERIFICATION: ${BYPASS_EMAIL_VERIFICATION:?BYPASS_EMAIL_VERIFICATION is required}
      SEED_DB: ${SEED_DB:?SEED_DB is required}
      ALLOW_ORIGINS: ${ALLOW_ORIGINS:?ALLOW_ORIGINS is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL is required}
      WORKER_API_KEY: ${WORKER_API_KEY:?WORKER_API_KEY is required}
      MAX_TURN_TIME_LIMIT_SECONDS: ${MAX_TURN_TIME_LIMIT_SECONDS:?MAX_TURN_TIME_LIMIT_SECONDS is required}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./backend/app:/app/app:z
      - ./backend/alembic:/app/alembic:z
      - uploads_data:/app/uploads
    networks:
      - app-network
    restart: unless-stopped

  agent-builder:
    build:
      context: orchestration
      dockerfile: Dockerfile.worker
    working_dir: /orchestration
    command: python agent_builder_worker.py
    environment:
      - BACKEND_URL=${WORKER_BACKEND_URL:?WORKER_BACKEND_URL is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - WORKER_API_KEY=${WORKER_API_KEY:?WORKER_API_KEY is required}
      - LOG_LEVEL=${WORKER_LOG_LEVEL:?WORKER_LOG_LEVEL is required}
      - BUILD_LOCAL_BASE_IMAGE=${BUILD_LOCAL_BASE_IMAGE:?BUILD_LOCAL_BASE_IMAGE is required}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./orchestration:/orchestration:z
      - /var/run/docker.sock:/var/run/docker.sock
      - uploads_data:/app/uploads
      - ./gamelib:/gamelib:z
    user: root
    networks:
      - app-network
    restart: unless-stopped

  match-runner:
    build:
      context: orchestration
      dockerfile: Dockerfile.worker
    working_dir: /orchestration
    command: python match_runner_worker.py
    environment:
      - BACKEND_URL=${WORKER_BACKEND_URL:?WORKER_BACKEND_URL is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - WORKER_API_KEY=${WORKER_API_KEY:?WORKER_API_KEY is required}
      - LOG_LEVEL=${WORKER_LOG_LEVEL:?WORKER_LOG_LEVEL is required}
      - MAX_TURN_TIME_LIMIT_SECONDS=${MAX_TURN_TIME_LIMIT_SECONDS:?MAX_TURN_TIME_LIMIT_SECONDS is required}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./orchestration:/orchestration:z
      - /var/run/docker.sock:/var/run/docker.sock
    user: root
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
